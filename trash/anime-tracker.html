<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tracker</title>
<style>
  :root[data-theme="dark"] {
    --bg-main: #1a1a2e;
    --bg-sidebar: #16213e;
    --bg-card: #0f3460;
    --bg-card-hover: #1a4a7a;
    --bg-header: #16213e;
    --bg-insert: #6b4c7a;
    --bg-search: #0f3460;
    --bg-user: #2a2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b0;
    --text-muted: #606080;
    --accent: #e94560;
    --accent-star: #f4c430;
    --accent-status-progress: #4caf50;
    --accent-status-watched: #2196f3;
    --border: #2a2a4a;
    --toggle-bg: #2a2a4a;
    --toggle-knob: #e0e0e0;
    --shadow: rgba(0,0,0,0.4);
    --scrollbar: #2a2a4a;
    --nav-active: #2a2a4a;
  }

  :root[data-theme="light"] {
    --bg-main: #f0f0f5;
    --bg-sidebar: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #f5f5f5;
    --bg-header: #ffffff;
    --bg-insert: #c9a8d4;
    --bg-search: #f0f0f5;
    --bg-user: #f0f0f5;
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a6a;
    --text-muted: #8a8aaa;
    --accent: #e94560;
    --accent-star: #d4a017;
    --accent-status-progress: #388e3c;
    --accent-status-watched: #1565c0;
    --border: #e0e0e8;
    --toggle-bg: #4caf50;
    --toggle-knob: #ffffff;
    --shadow: rgba(0,0,0,0.1);
    --nav-active: #f0f0f5;
    --scrollbar: #e0e0e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 170px;
    min-width: 170px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    transition: background 0.3s, border-color 0.3s;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 18px 20px;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hamburger {
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-left: auto;
  }

  nav {
    flex: 1;
    padding: 12px 0;
    overflow-y: auto;
  }

  nav a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 0.85rem;
    border-radius: 6px;
    margin: 2px 8px;
    transition: background 0.2s, color 0.2s;
    cursor: pointer;
  }

  nav a:hover, nav a.active {
    background: var(--nav-active);
    color: var(--text-primary);
  }

  nav a svg { width: 18px; height: 18px; flex-shrink: 0; }

  .sidebar-bottom {
    border-top: 1px solid var(--border);
    padding: 14px 12px;
  }

  .theme-toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .theme-toggle-row svg { width: 16px; height: 16px; flex-shrink: 0; }

  .toggle-label { flex: 1; font-size: 0.8rem; }

  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .toggle-switch input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--toggle-bg);
    border-radius: 22px;
    transition: background 0.3s;
  }

  [data-theme="light"] .toggle-track { background: #4caf50; }
  [data-theme="dark"] .toggle-track { background: #3a3a5a; }

  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    background: var(--toggle-knob);
    border-radius: 50%;
    transition: transform 0.3s;
  }

  [data-theme="light"] .toggle-knob { transform: translateX(18px); }

  .user-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-user);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e94560, #6b4c7a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .user-info { flex: 1; overflow: hidden; }
  .user-name { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .logout-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: background 0.3s, border-color 0.3s;
  }

  .header-logo {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .search-bar {
    flex: 1;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-search);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    transition: background 0.3s;
  }

  .search-bar svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 0.85rem;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--text-muted); }

  .header-user {
    margin-left: auto;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--bg-search);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }

  /* ── GRID ── */
  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  /* ── INSERT CARD ── */
  .card-insert {
    background: var(--bg-insert);
    border-radius: 8px;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px dashed rgba(255,255,255,0.25);
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card-insert:hover { border-color: rgba(255,255,255,0.5); filter: brightness(1.08); }

  .card-insert-text {
    color: rgba(255,255,255,0.9);
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    padding: 0 12px;
    z-index: 1;
  }

  .card-insert-star {
    position: absolute;
    bottom: 14px;
    font-size: 1.1rem;
  }

  .card-insert-triangle {
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 50px 50px;
    border-color: transparent transparent rgba(0,0,0,0.2) transparent;
  }

  /* ── ANIME CARD ── */
  .anime-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
  }

  .card-poster {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 3/4;
    background: var(--bg-card);
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .anime-card:hover .card-poster {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px var(--shadow);
  }

  .card-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Placeholder when no image */
  .card-poster-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2a4a 0%, #3a2a5a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: rgba(255,255,255,0.2);
  }

  [data-theme="light"] .card-poster-placeholder {
    background: linear-gradient(135deg, #d8d8e8 0%, #c8b8d8 100%);
    color: rgba(0,0,0,0.15);
  }

  .card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .anime-card:hover .card-actions { opacity: 1; }

  .card-action-btn {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: rgba(0,0,0,0.65);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: background 0.2s;
  }

  .card-action-btn:hover { background: var(--accent); }
  .card-action-btn.delete:hover { background: #e53935; }

  .card-info { padding: 0 2px; }

  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-status {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .status-progress { color: var(--accent-status-progress); }
  .status-watched { color: var(--accent-status-watched); }
  .status-planned { color: var(--text-muted); }

  .card-star {
    color: var(--accent-star);
    font-size: 0.75rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 360px;
    max-width: 94vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal h2 { font-size: 1rem; margin-bottom: 18px; color: var(--text-primary); }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 5px;
    font-weight: 600;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-group select option { background: var(--bg-sidebar); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.2s;
  }

  .btn:hover { filter: brightness(1.1); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--bg-main); color: var(--text-secondary); border: 1px solid var(--border); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 10px;
    font-size: 0.72rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  footer strong { color: var(--text-secondary); }

  /* Scrollbar styling */
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
</style>
</head>

<!-- ADD ANIME MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Add New Anime</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="inputTitle" placeholder="e.g. Apothecary Diaries">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Season</label>
        <input type="text" id="inputSeason" placeholder="e.g. Season 1">
      </div>
      <div class="form-group">
        <label>Episodes</label>
        <input type="text" id="inputEpisodes" placeholder="e.g. 24 episodes">
      </div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="inputStatus">
        <option value="In Progress">In Progress</option>
        <option value="Watched">Watched</option>
        <option value="Planned">Planned</option>
      </select>
    </div>
    <div class="form-group">
      <label>Poster URL (optional)</label>
      <input type="text" id="inputImage" placeholder="https://... (leave blank for placeholder)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addAnime()">Add Anime</button>
    </div>
  </div>
</div>

<script>
  // ── THEME ──
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeLabel').textContent = isDark ? 'Dark Mode' : 'Light Mode';
  }

  // Sync checkbox on load
  window.addEventListener('DOMContentLoaded', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('themeToggle').checked = !isDark; // checked = light
    document.getElementById('themeLabel').textContent = isDark ? 'Light Mode' : 'Dark Mode';

    // Load saved entries
    loadEntries();
  });

  // ── DATA ──
  let entries = JSON.parse(localStorage.getItem('animeEntries') || '[]');

  // Seed with sample data if empty
  if (entries.length === 0) {
    entries = [
      { id: 1, title: 'May I Ask For One Final Thing', season: 'Season 1', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 2, title: 'Apothecary Diaries', season: 'Season 1-2', episodes: '48 episodes', status: 'Watched', image: '' },
      { id: 3, title: 'Gachiakuta', season: 'Season 1', episodes: '24 episodes', status: 'Watched', image: '' },
      { id: 4, title: 'May I Ask For One Final Thing', season: 'Season 1', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 5, title: 'Apothecary Diaries', season: 'Season 1-2', episodes: '48 episodes', status: 'Watched', image: '' },
      { id: 6, title: 'Gachiakuta', season: 'Season 1', episodes: '24 episodes', status: 'Watched', image: '' },
      { id: 7, title: 'May I Ask For One Final Thing', season: 'Season 1', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 8, title: 'Apothecary Diaries', season: 'Season 1-2', episodes: '48 episodes', status: 'Watched', image: '' },
      { id: 9, title: 'Gachiakuta', season: 'Season 2', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 10, title: 'May I Ask For One Final Thing', season: 'Season 1', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 11, title: 'Apothecary Diaries', season: 'Season 1-2', episodes: '48 episodes', status: 'Watched', image: '' },
      { id: 12, title: 'Gachiakuta', season: 'Season 1', episodes: '24 episodes', status: 'Watched', image: '' },
      { id: 13, title: 'May I Ask For One Final Thing', season: 'Season 1', episodes: '5/15 episodes', status: 'In Progress', image: '' },
      { id: 14, title: 'Apothecary Diaries', season: 'Season 1-2', episodes: '48 episodes', status: 'Watched', image: '' },
    ];
    saveEntries();
  }

  function saveEntries() {
    localStorage.setItem('animeEntries', JSON.stringify(entries));
  }

  function loadEntries() {
    renderCards(entries);
  }

  function statusClass(status) {
    if (status === 'In Progress') return 'status-progress';
    if (status === 'Watched') return 'status-watched';
    return 'status-planned';
  }

  function createCard(entry) {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.setAttribute('data-id', entry.id);
    card.setAttribute('data-title', entry.title.toLowerCase());

    const posterContent = entry.image
      ? `<img src="${entry.image}" alt="${entry.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-poster-placeholder" style="display:none">📺</div>`
      : `<div class="card-poster-placeholder">📺</div>`;

    card.innerHTML = `
      <div class="card-poster">
        ${posterContent}
        <div class="card-actions">
          <button class="card-action-btn" title="Edit" onclick="editCard(event, ${entry.id})">✏️</button>
          <button class="card-action-btn delete" title="Delete" onclick="deleteCard(event, ${entry.id})">✕</button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${entry.title}</div>
        <div class="card-meta">${entry.season} · ${entry.episodes}</div>
        <div class="card-bottom">
          <span class="card-status ${statusClass(entry.status)}">${entry.status}</span>
          <span class="card-star">★</span>
        </div>
      </div>
    `;
    return card;
  }

  function renderCards(list) {
    const grid = document.getElementById('animeGrid');
    // Remove all except insert card
    [...grid.children].forEach(c => { if (!c.classList.contains('card-insert')) c.remove(); });
    list.forEach(e => grid.appendChild(createCard(e)));
  }

  // ── MODAL ──
  function openModal(editId = null) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inputTitle').focus();
    if (editId) document.getElementById('modalOverlay').setAttribute('data-edit', editId);
    else document.getElementById('modalOverlay').removeAttribute('data-edit');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    ['inputTitle','inputSeason','inputEpisodes','inputImage'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputStatus').value = 'In Progress';
    document.getElementById('modalOverlay').removeAttribute('data-edit');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function addAnime() {
    const title = document.getElementById('inputTitle').value.trim();
    if (!title) { document.getElementById('inputTitle').focus(); return; }

    const editId = document.getElementById('modalOverlay').getAttribute('data-edit');

    const entry = {
      id: editId ? parseInt(editId) : Date.now(),
      title,
      season: document.getElementById('inputSeason').value.trim() || 'Season 1',
      episodes: document.getElementById('inputEpisodes').value.trim() || '? episodes',
      status: document.getElementById('inputStatus').value,
      image: document.getElementById('inputImage').value.trim(),
    };

    if (editId) {
      const idx = entries.findIndex(e => e.id === entry.id);
      if (idx !== -1) entries[idx] = entry;
    } else {
      entries.push(entry);
    }

    saveEntries();
    renderCards(entries);
    closeModal();
  }

  function deleteCard(event, id) {
    event.stopPropagation();
    entries = entries.filter(e => e.id !== id);
    saveEntries();
    renderCards(entries);
  }

  function editCard(event, id) {
    event.stopPropagation();
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    document.getElementById('inputTitle').value = entry.title;
    document.getElementById('inputSeason').value = entry.season;
    document.getElementById('inputEpisodes').value = entry.episodes;
    document.getElementById('inputStatus').value = entry.status;
    document.getElementById('inputImage').value = entry.image;
    openModal(id);
  }

  // ── SEARCH ──
  function filterCards() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = q ? entries.filter(e => e.title.toLowerCase().includes(q)) : entries;
    renderCards(filtered);
  }

  // Keyboard shortcut: Escape closes modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
